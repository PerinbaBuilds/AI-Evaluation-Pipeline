<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}EvalPipe{% endblock %} · EvalPipe</title>
  <meta name="description" content="EvalPipe — evaluation pipeline for LLM applications: benchmark runs, metrics, and statistical A/B testing.">
  <link rel="stylesheet" href="/static/styles.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='5' fill='%232a78d6'/%3E%3Cpath d='M6 15.5 10 10l3 3.5L18 7' stroke='%23fff' stroke-width='2.2' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
</head>
<body>
  <a class="skip-link" href="#main">Skip to main content</a>
  <header class="site-header">
    <div class="inner">
      <a class="brand" href="/">
        <svg width="24" height="24" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="1" y="1" width="22" height="22" fill="#2a78d6" stroke="#191613" stroke-width="2"/>
          <path d="M6 15.5 10 10l3 3.5L18 7" stroke="#fffdf8" stroke-width="2.4" fill="none" stroke-linecap="square"/>
        </svg>
        EVALPIPE
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="/" {% if active_nav == 'dashboard' %}aria-current="page"{% endif %}>Dashboard</a>
        <a href="/compare" {% if active_nav == 'compare' %}aria-current="page"{% endif %}>A/B Compare</a>
        <a href="/playground" {% if active_nav == 'playground' %}aria-current="page"{% endif %}>Playground</a>
        <a href="/docs">API docs</a>
      </nav>
    </div>
  </header>
  <main id="main">
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    EvalPipe /// provider-agnostic LLM evaluation /// measure twice, ship once
  </footer>
  <script src="/static/charts.js" defer></script>
  {% block scripts %}{% endblock %}
</body>
</html>
