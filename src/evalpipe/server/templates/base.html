<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}EvalPipe{% endblock %} · EvalPipe</title>
  <meta name="description" content="EvalPipe — evaluation pipeline for LLM applications: benchmark runs, metrics, and statistical A/B testing.">
  <script>
    /* Set the theme before first paint to avoid a flash. Stored choice wins;
       otherwise follow the OS preference. */
    (function () {
      try {
        var saved = localStorage.getItem("evalpipe-theme");
        var dark = saved ? saved === "dark"
          : window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        if (dark) document.documentElement.setAttribute("data-theme", "dark");
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="/static/styles.css?v={{ asset_version }}">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%232f6feb'/%3E%3Cpath d='M6 15.5 10 10l3 3.5L18 7' stroke='%23ffffff' stroke-width='2.4' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
</head>
<body>
  <a class="skip-link" href="#main">Skip to main content</a>
  <div class="app">
    <aside class="sidebar">
      <a class="brand" href="/">
        <svg width="26" height="26" viewBox="0 0 24 24" aria-hidden="true">
          <rect width="24" height="24" rx="6" fill="#2f6feb"/>
          <path d="M6 15.5 10 10l3 3.5L18 7" stroke="#ffffff" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>EvalPipe</span>
      </a>

      <nav class="side-nav" aria-label="Primary">
        <span class="side-label">Workspace</span>
        <a href="/" {% if active_nav == 'dashboard' %}aria-current="page"{% endif %}>
          <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="7" height="9" rx="1.3"/><rect x="14" y="3" width="7" height="5" rx="1.3"/><rect x="14" y="12" width="7" height="9" rx="1.3"/><rect x="3" y="16" width="7" height="5" rx="1.3"/></svg>
          Overview
        </a>
        <a href="/compare" {% if active_nav == 'compare' %}aria-current="page"{% endif %}>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 3h5v5M21 3l-7 7M8 21H3v-5M3 21l7-7"/></svg>
          A/B Compare
        </a>
        <a href="/playground" {% if active_nav == 'playground' %}aria-current="page"{% endif %}>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
          Playground
        </a>
        <span class="side-label">Reference</span>
        <a href="/docs">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m8 6-5 6 5 6M16 6l5 6-5 6"/></svg>
          API reference
        </a>
      </nav>

      <div class="side-foot">
        <button type="button" id="theme-toggle" class="theme-toggle" aria-pressed="false" aria-label="Toggle dark mode">
          <svg class="ic-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
          <svg class="ic-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
          <span class="theme-label">Dark mode</span>
        </button>
        <div class="side-tag">Provider-agnostic evaluation for LLM applications.</div>
        <div class="side-ver">v1.0.0</div>
      </div>
    </aside>

    <div class="main">
      <main id="main" class="content">
        {% block content %}{% endblock %}
      </main>
    </div>
  </div>
  <script src="/static/charts.js?v={{ asset_version }}" defer></script>
  <script src="/static/ui.js?v={{ asset_version }}" defer></script>
  {% block scripts %}{% endblock %}
</body>
</html>
