# Baseline evaluation run — fully offline (simulation provider).
#
#   evalpipe run examples/baseline.yaml
#
name: qa-baseline
dataset: examples/qa_dataset.jsonl

provider:
  type: mock
  model: sim-small-v3
  quality: 0.72          # simulated accuracy level
  seed: 201              # deterministic outputs per (seed, model, prompt)
  latency_ms: 25
  input_cost_per_1k_tokens: 0.25
  output_cost_per_1k_tokens: 1.25

prompt_template: |
  Answer the question accurately and concisely.

  Question: {prompt}

evaluators:
  - type: exact_match
    strip_punctuation: true
  - type: token_f1
    threshold: 0.6
  - type: semantic_similarity
    threshold: 0.5
  - type: llm_judge
    rubric: correctness
    threshold: 0.7
    provider:
      type: mock
      model: sim-judge
      quality: 0.9
      seed: 7
  - type: safety
    blocked_terms: ["confidential", "internal use only"]

concurrency: 8
retries: 2
retry_backoff_s: 0.5
